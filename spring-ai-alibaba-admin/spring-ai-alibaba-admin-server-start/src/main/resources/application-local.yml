# Local development environment configuration
# To use this profile, run with: -Dspring.profiles.active=local
server:
  port: 28080
  compression:
    enabled: true
spring:
  datasource:
    url: jdbc:mysql://localhost:3306/admin?useUnicode=true&characterEncoding=utf-8&zeroDateTimeBehavior=convertToNull&allowMultiQueries=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai
    username: root
    password: 123456
  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      password: 123456
    elasticsearch:
      uris: http://localhost:9200
  jpa:
    properties:
      jakarta:
        persistence:
          jdbc:
            url: jdbc:mysql://localhost:3306/admin?useUnicode=true&characterEncoding=utf-8&zeroDateTimeBehavior=convertToNull&allowMultiQueries=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai
            user: root
            password: 123456
            driver: com.mysql.cj.jdbc.Driver
  freemarker:
    cache: false
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 500MB
      enabled: true
  application:
    name: saa-studio

nacos:
  server-addr: localhost:8848

rocketmq:
  endpoints: localhost:18080
  document-index-topic: topic_saa_studio_document_index
  document_index_group: group_saa_studio_document_index

management:
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      enabled: true
      export:
        enabled: true
      endpoint: http://localhost:4318/v1/traces
    metrics:
      export:
        enabled: false
    logging:
      export:
        enabled: false

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.alibaba.cloud.ai.studio.admin.entity
  configuration:
    map-underscore-to-camel-case: true

logging:
  level:
    org.springframework.boot.autoconfigure: INFO
    com.alibaba.cloud.ai: DEBUG
